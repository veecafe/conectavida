<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
  <h2 class="text-primary mb-4">Painel Administrativo 🛡️</h2>

  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card text-center bg-light">
        <div class="card-body">
          <h3 class="text-primary" th:text="${totalUsers}">0</h3>
          <p class="mb-0">Usuários</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-center bg-light">
        <div class="card-body">
          <h3 class="text-primary" th:text="${totalDiseases}">0</h3>
          <p class="mb-0">Doenças</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-center bg-light">
        <div class="card-body">
          <h3 class="text-primary" th:text="${totalSpecialties}">0</h3>
          <p class="mb-0">Especialidades</p>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-3">
      <a th:href="@{/admin/users}" class="btn btn-outline-primary w-100 py-3">👥 Gerenciar Usuários</a>
    </div>
    <div class="col-md-4 mb-3">
      <a th:href="@{/admin/diseases}" class="btn btn-outline-primary w-100 py-3">🩺 Gerenciar Doenças</a>
    </div>
    <div class="col-md-4 mb-3">
      <a th:href="@{/admin/specialties}" class="btn btn-outline-primary w-100 py-3">⭐ Gerenciar Especialidades</a>
    </div>
  </div>
</div>
</body>
</html>
