<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
  <h2 class="text-primary mb-4">Usuários cadastrados</h2>

  <div class="card">
    <table class="table table-striped mb-0">
      <thead>
      <tr><th>ID</th><th>Nome</th><th>Email</th><th>Tipo</th><th>Cadastrado em</th></tr>
      </thead>
      <tbody>
      <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.name}"></td>
        <td th:text="${u.email}"></td>
        <td><span class="badge bg-secondary" th:text="${u.role}"></span></td>
        <td th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
