<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Entrar - ConectaVida</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body p-4">
          <h3 class="text-center text-primary mb-4">Bem-vindo de volta</h3>

          <div th:if="${param.registered}" class="alert alert-success">
            Cadastro realizado! Faça login para continuar.
          </div>
          <div th:if="${param.error}" class="alert alert-danger">
            Email ou senha inválidos.
          </div>
          <div th:if="${param.logout}" class="alert alert-info">
            Você saiu do sistema.
          </div>

          <form th:action="@{/login}" method="post">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
          </form>
          <p class="text-center mt-3 mb-0">
            Não tem conta? <a th:href="@{/register}">Cadastre-se</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
