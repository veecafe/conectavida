<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Prestadores Vinculados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
  <h2 class="text-primary mb-4">Prestadores Vinculados</h2>

  <div class="card mb-4">
    <div class="card-header"><strong>Vincular prestador</strong></div>
    <div class="card-body">
      <form th:action="@{/institution/providers/add}" method="post" class="row g-2">
        <div class="col-md-9">
          <select name="providerId" class="form-select" required>
            <option value="">Selecione...</option>
            <option th:each="p : ${allProviders}" th:value="${p.id}" th:text="${p.user.name + ' - ' + p.profession}"></option>
          </select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100" type="submit">Vincular</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><strong>Vinculados</strong></div>
    <ul class="list-group list-group-flush">
      <li th:if="${institution.providers.empty}" class="list-group-item text-muted">Nenhum prestador vinculado.</li>
      <li th:each="p : ${institution.providers}" class="list-group-item d-flex justify-content-between align-items-center">
                <span>
                    <strong th:text="${p.user.name}"></strong>
                    <small class="text-muted d-block" th:text="${p.profession}"></small>
                </span>
        <form th:action="@{/institution/providers/remove}" method="post">
          <input type="hidden" name="providerId" th:value="${p.id}">
          <button class="btn btn-sm btn-outline-danger" type="submit">Remover</button>
        </form>
      </li>
    </ul>
  </div>
</div>
</body>
</html>
