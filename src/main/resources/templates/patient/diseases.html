<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Minhas Doenças</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
  <h2 class="text-primary mb-4">Minhas Doenças</h2>

  <div class="card mb-4">
    <div class="card-header"><strong>Adicionar doença</strong></div>
    <div class="card-body">
      <form th:action="@{/patient/diseases/add}" method="post" class="row g-2">
        <div class="col-md-9">
          <select name="diseaseId" class="form-select" required>
            <option value="">Selecione uma doença...</option>
            <option th:each="d : ${allDiseases}" th:value="${d.id}" th:text="${d.name}"></option>
          </select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-primary w-100" type="submit">Adicionar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><strong>Doenças cadastradas</strong></div>
    <ul class="list-group list-group-flush">
      <li th:if="${patient.diseases.empty}" class="list-group-item text-muted">Nenhuma doença cadastrada ainda.</li>
      <li th:each="d : ${patient.diseases}" class="list-group-item d-flex justify-content-between align-items-center">
                <span>
                    <strong th:text="${d.name}"></strong>
                    <small class="text-muted d-block" th:text="${d.description}"></small>
                </span>
        <form th:action="@{/patient/diseases/remove}" method="post">
          <input type="hidden" name="diseaseId" th:value="${d.id}">
          <button class="btn btn-sm btn-outline-danger" type="submit">Remover</button>
        </form>
      </li>
    </ul>
  </div>
</div>
</body>
</html>
