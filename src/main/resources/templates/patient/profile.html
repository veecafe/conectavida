<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Meu Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
  <h2 class="text-primary mb-4">Meu Perfil</h2>
  <div th:if="${param.updated}" class="alert alert-success">Perfil atualizado!</div>

  <div class="card">
    <div class="card-body">
      <form th:action="@{/patient/profile}" method="post">
        <div class="mb-3">
          <label class="form-label">CPF</label>
          <input type="text" name="cpf" class="form-control" th:value="${patient.cpf}">
        </div>
        <div class="mb-3">
          <label class="form-label">Data de Nascimento</label>
          <input type="date" name="birthDate" class="form-control" th:value="${patient.birthDate}">
        </div>
        <div class="mb-3">
          <label class="form-label">Telefone</label>
          <input type="text" name="phone" class="form-control" th:value="${patient.phone}">
        </div>
        <div class="mb-3">
          <label class="form-label">CEP</label>
          <input type="text" name="cep" class="form-control" th:value="${patient.cep}">
        </div>
        <div class="mb-3">
          <label class="form-label">Endereço</label>
          <input type="text" name="address" class="form-control" th:value="${patient.address}">
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a th:href="@{/patient/dashboard}" class="btn btn-link">Voltar</a>
      </form>
    </div>
  </div>
</div>
</body>
</html>
